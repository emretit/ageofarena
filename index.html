<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Age of Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; user-select: none; }
    canvas#game-canvas { display: block; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      z-index: 10;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #resource-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 8px 16px;
      background: linear-gradient(180deg, rgba(40,25,10,0.95) 0%, rgba(30,18,6,0.9) 100%);
      border-bottom: 2px solid rgba(180,140,60,0.4);
      color: #f0e0c0;
      font-size: 15px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    .resource {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .resource span:last-child {
      min-width: 32px;
      text-align: right;
    }

    /* === AoE2-style Bottom HUD === */
    #bottom-hud {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      display: flex;
      background: linear-gradient(0deg,
        rgba(22,14,6,0.97) 0%,
        rgba(35,22,10,0.96) 40%,
        rgba(45,30,14,0.95) 100%
      );
      border-top: 3px solid #5a4a28;
      z-index: 10;
      font-family: 'Segoe UI', Arial, sans-serif;
      pointer-events: auto;
    }

    /* Üst kenar süsü - altın şerit */
    #bottom-hud::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(200,170,80,0.6) 20%,
        rgba(200,170,80,0.8) 50%,
        rgba(200,170,80,0.6) 80%,
        transparent 100%
      );
    }

    /* Sol panel - Birim portreleri */
    #unit-panel {
      width: 160px;
      min-width: 160px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 2px solid rgba(80,60,30,0.5);
      padding: 8px;
    }

    .unit-portrait {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #2a1a0a 0%, #3a2a14 100%);
      border: 2px solid #5a4a28;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6a5a3a;
      font-size: 11px;
    }

    .unit-grid {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      gap: 3px;
    }

    /* Orta panel - Bilgi / aksiyon alanı */
    #info-panel {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10px 16px;
      border-right: 2px solid rgba(80,60,30,0.5);
      position: relative;
    }

    #info-header {
      color: #e0d0a0;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(100,80,40,0.3);
    }

    #info-content {
      flex: 1;
      display: flex;
      align-items: center;
      color: #8a7a5a;
      font-size: 12px;
    }


    #queue-display {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .queue-slot {
      width: 36px;
      height: 36px;
      background: #2a1a0a;
      border: 1px solid #4a3a20;
      border-radius: 2px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
    }

    .queue-slot .queue-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #4a4;
      border-radius: 0 0 1px 1px;
    }

    /* Sağ panel - Minimap container */
    #minimap-container {
      width: 320px;
      min-width: 320px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    #minimap-container canvas {
      display: block;
      image-rendering: pixelated;
      pointer-events: auto;
    }

    /* === Command Grid (alt HUD içinde) === */
    #command-grid {
      display: grid;
      grid-template-columns: repeat(5, 42px);
      grid-template-rows: repeat(3, 42px);
      gap: 3px;
    }

    .command-slot {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #2a1a0a 0%, #3a2a14 100%);
      border: 2px solid #4a3a20;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: default;
    }

    .command-slot.active {
      cursor: pointer;
      border-color: #5a4a28;
    }

    .command-slot.active:hover {
      border-color: #9a8a58;
      background: linear-gradient(180deg, #4a3a1e 0%, #3a2a14 100%);
    }

    .command-slot.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #4a2020;
    }

    .hotkey-label {
      position: absolute;
      top: 1px;
      left: 3px;
      font-size: 9px;
      font-weight: bold;
      color: rgba(200,180,120,0.7);
      text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
      pointer-events: none;
      line-height: 1;
    }

    .command-slot {
      position: relative;
    }

    #command-tooltip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 6px;
      background: rgba(22,14,6,0.95);
      border: 1px solid #5a4a28;
      border-radius: 3px;
      padding: 8px 10px;
      color: #e0d0a0;
      font-size: 12px;
      min-width: 180px;
      max-width: 220px;
      z-index: 20;
      pointer-events: none;
    }

    .tooltip-name {
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .tooltip-cost {
      color: #a0906a;
      font-size: 11px;
      line-height: 1.4;
    }

    .tooltip-cost .insufficient {
      color: #cc4444;
    }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div id="resource-bar">
      <div id="age-indicator" class="resource" style="color:#f0c840;font-size:12px;letter-spacing:0.5px;">
        <span>🏛️</span><span id="age-name">Dark Age</span>
      </div>
      <div class="resource"><span>🍞</span><span id="food">200</span></div>
      <div class="resource"><span>🪵</span><span id="wood">200</span></div>
      <div class="resource"><span>🪙</span><span id="gold">100</span></div>
      <div class="resource"><span>👥</span><span id="pop">0/5</span></div>
      <div class="resource" id="idle-villager-btn" style="cursor:pointer;pointer-events:auto;"><span>👷</span><span id="idle-count">0</span></div>
      <div class="resource"><span>⚔️</span><span id="military-count">0</span></div>
      <div id="game-timer" class="resource" style="color:#a0906a;font-size:12px;margin-left:auto;">
        <span>⏱️</span><span id="game-time">00:00</span>
      </div>
    </div>
  </div>

  <div id="bottom-hud">
    <!-- Sol: Birim portreleri -->
    <div id="unit-panel">
      <div class="unit-grid">
        <div class="unit-portrait"></div>
        <div class="unit-portrait"></div>
        <div class="unit-portrait"></div>
        <div class="unit-portrait"></div>
        <div class="unit-portrait"></div>
        <div class="unit-portrait"></div>
      </div>
    </div>

    <!-- Orta: Bilgi paneli -->
    <div id="info-panel">
      <div id="info-header">Age of Arena</div>
      <div id="info-content">Bir bina veya birim seçin</div>
      <div id="command-grid"></div>
      <div id="queue-display"></div>
      <div id="command-tooltip"></div>
    </div>

    <!-- Sağ: Minimap -->
    <div id="minimap-container"></div>
  </div>

  <div id="drag-box" style="position:fixed;border:1px solid #0f0;background:rgba(0,255,0,0.1);z-index:20;pointer-events:none;display:none;"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
