[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Required env vars (set in Netlify dashboard):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#   VITE_WS_URL      (Railway server WebSocket URL)
#   VITE_SENTRY_DSN  (optional — error/desync telemetry; blank = disabled)

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
