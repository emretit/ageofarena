<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Age of Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; user-select: none; }
    canvas { display: block; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      z-index: 10;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #resource-bar {
      display: flex;
      justify-content: space-around;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
    }

    .resource {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 70px;
      background: rgba(10, 10, 10, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 14px;
      font-family: 'Segoe UI', Arial, sans-serif;
      pointer-events: auto;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div id="resource-bar">
      <div class="resource"><span>🍞</span><span id="food">200</span></div>
      <div class="resource"><span>🪵</span><span id="wood">200</span></div>
      <div class="resource"><span>🪙</span><span id="gold">100</span></div>
    </div>
  </div>
  <div id="bottom-bar">Bina / Birim paneli (yakında)</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
